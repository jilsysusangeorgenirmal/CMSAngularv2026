<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Pending Lab Tests</h2>
    <div class="d-flex align-items-center gap-3">
      <div class="input-group input-group-sm" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0">
          <i class="fas fa-search text-muted"></i>
        </span>
        <input type="text" class="form-control border-start-0 ps-0" 
          placeholder="Search patient, test or doctor..." 
          [(ngModel)]="searchTerm">
      </div>
      <button class="btn btn-sm btn-outline-secondary" (click)="loadPendingPrescriptions()" [disabled]="isLoading">
        <i class="fas fa-sync-alt" [class.fa-spin]="isLoading"></i> Refresh
      </button>
      <div *ngIf="isLoading" class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped mb-0 align-middle">
          <thead class="table-primary">
            <tr>
              <th>ID</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Test Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of filteredPrescriptions">
              <td>{{ p.LabTestPrescriptionId }}</td>
              <td>{{ p.PatientName }}</td>
              <td>{{ p.DoctorName }}</td>
              <td>{{ p.TestName }}</td>
              <td>{{ p.CategoryName }}</td>
              <td>{{ p.Price | currency:'INR' }}</td>
              <td>
                <span class="badge rounded-pill" 
                  [ngClass]="{
                    'bg-warning text-dark': p.Status === 'Pending',
                    'bg-success': p.Status === 'Completed',
                    'bg-info': p.Status === 'InProgress'
                  }">
                  <i class="fas" [ngClass]="{
                    'fa-clock': p.Status === 'Pending',
                    'fa-check-circle': p.Status === 'Completed',
                    'fa-spinner fa-spin': p.Status === 'InProgress'
                  } + ' me-1'"></i>
                  {{ p.Status }}
                </span>
              </td>
              <td>
                <div class="btn-group gap-2">
                  <button class="btn btn-sm btn-outline-primary" 
                    *ngIf="p.Status !== 'Completed'"
                    (click)="openAddResultModal(p)">
                    <i class="fas fa-plus-circle me-1"></i> Add Result
                  </button>
                  <button class="btn btn-sm btn-success"
                    *ngIf="p.Status === 'Completed'"
                    (click)="generateBill(p.PrescriptionId)">
                    <i class="fas fa-file-invoice-dollar me-1"></i> Generate Bill
                  </button>
                  <button class="btn btn-sm btn-outline-danger"
                    *ngIf="p.Status === 'Completed'"
                    (click)="downloadPdfReport(p.PrescriptionId)">
                    <i class="fas fa-file-pdf me-1"></i> Download PDF
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="!isLoading && pendingPrescriptions.length === 0">
              <td colspan="8" class="text-center text-muted py-4">
                No matching lab tests found.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Result Modal logic -->
<app-add-result-modal 
  *ngIf="showAddResultModal && selectedPrescription" 
  [prescription]="selectedPrescription"
  (closeModal)="onModalClose()"
  (resultAdded)="onResultAdded()">
</app-add-result-modal>
