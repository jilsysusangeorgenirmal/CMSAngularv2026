<div class="card shadow-sm mt-3">
  <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
    <h4 class="mb-0 text-primary"><i class="fas fa-tags me-2"></i> Lab Test Categories</h4>
    <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Category Name</th>
            <th>Description</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cat of categories">
            <td>{{ cat.CategoryId }}</td>
            <td class="fw-bold">{{ cat.CategoryName }}</td>
            <td>{{ cat.Description || 'No description provided' }}</td>
            <td>
              <span class="badge" [ngClass]="cat.IsActive ? 'bg-success' : 'bg-danger'">
                {{ cat.IsActive ? 'Active' : 'Inactive' }}
              </span>
            </td>
          </tr>
          <tr *ngIf="!isLoading && categories.length === 0">
            <td colspan="4" class="text-center py-4 text-muted">
              No lab test categories found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
