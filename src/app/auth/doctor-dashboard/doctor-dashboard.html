<app-header></app-header>

<div class="dashboard-container py-4 bg-light min-vh-100">
  <div class="container-fluid px-4">
    <!-- Action buttons -->
    <div class="row mb-4">
      <div class="col-12 d-flex justify-content-between align-items-center">
        <div>
           <h2 class="fw-bold text-dark mb-1">Doctor Dashboard</h2>
           <p class="text-muted mb-0">Manage your appointments, patient consults, and schedule.</p>
        </div>
        <div>
           <a [routerLink]="['/auth/doctor/history']" class="btn btn-primary rounded-pill px-4 shadow-sm">
             <i class="fas fa-history me-2"></i> Consultation History
           </a>
        </div>
      </div>
    </div>

    <!-- Active Consultation Form -->
    <div class="row" *ngIf="activeAppointment">
       <div class="col-12">
          <app-consultation-form 
             [appointment]="activeAppointment" 
             (closeEvent)="onCloseConsultation()">
          </app-consultation-form>
       </div>
    </div>

    <!-- Today's Appointments -->
    <div class="row" *ngIf="!activeAppointment">
       <div class="col-12">
          <app-today-appointments-list 
            (startConsultationEvent)="onStartConsultation($event)">
          </app-today-appointments-list>
       </div>
    </div>
    
  </div>
</div>
